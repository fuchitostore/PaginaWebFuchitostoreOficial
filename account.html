<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Cuenta — FuchitoStore</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--bg2:#0f0f18;--bg3:#14141f;--bg4:#1c1c2a;
  --neon:#39FF14;--gold:#FFB700;--red:#FF3B3B;
  --white:#fff;--muted:rgba(255,255,255,0.45);--border:rgba(255,255,255,0.07);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);padding-top:62px}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:500;height:62px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 36px;background:rgba(9,9,15,0.92);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:8px;font-family:'Bebas Neue',sans-serif;
  font-size:1.4rem;letter-spacing:2px;color:var(--neon);text-decoration:none}
.nav-logo span{color:var(--white)}
.nav-wa{display:flex;align-items:center;gap:7px;background:#25D366;color:#fff;
  font-weight:700;font-size:0.78rem;border:none;padding:9px 18px;border-radius:6px;
  cursor:pointer;text-decoration:none;transition:background 0.2s}
.nav-wa:hover{background:#1db954}

/* LAYOUT */
.acc-page{max-width:1000px;margin:0 auto;padding:48px 32px 80px}

/* LOADING */
.acc-loading{text-align:center;padding:80px;color:var(--muted)}
.acc-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--neon);
  border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEADER PERFIL */
.acc-header{display:flex;align-items:flex-start;gap:24px;margin-bottom:40px;
  padding-bottom:32px;border-bottom:1px solid var(--border)}
.acc-avatar-wrap{width:80px;height:80px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--neon),#00a8ff);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--bg);
  overflow:hidden;border:2px solid rgba(57,255,20,0.3)}
.acc-meta{flex:1}
.acc-meta h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;line-height:1.1}
.acc-meta-email{font-size:0.78rem;color:var(--muted);margin-top:4px}

/* GRID DE STATS DEL PERFIL */
.acc-profile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:16px}
.acc-stat{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 16px}
.acc-stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--neon);line-height:1}
.acc-stat-lbl{font-size:0.63rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:3px}

/* CUPÓN PENDIENTE */
.acc-cupon{display:none;background:rgba(255,183,0,0.08);border:1px solid rgba(255,183,0,0.25);
  border-radius:10px;padding:14px 18px;font-size:0.82rem;color:var(--gold);margin-bottom:24px}

/* CAJA DIARIA */
.acc-caja-card{background:var(--bg2);border:1px solid rgba(57,255,20,0.2);
  border-radius:14px;padding:24px;display:flex;align-items:center;
  justify-content:space-between;gap:20px;margin-bottom:40px}
.acc-caja-info h3{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;
  letter-spacing:1px;color:var(--neon);margin-bottom:4px}
.acc-caja-info p{font-size:0.78rem;color:var(--muted)}
.acc-caja-status{font-size:0.8rem;font-weight:600;margin-top:6px}
.acc-caja-btn{background:var(--neon);color:var(--bg);border:none;padding:13px 28px;
  border-radius:10px;font-weight:700;font-size:0.88rem;cursor:pointer;
  transition:opacity 0.2s;white-space:nowrap}
.acc-caja-btn:disabled{opacity:0.4;cursor:not-allowed}
.acc-caja-btn:not(:disabled):hover{opacity:0.85}

/* SECCIONES */
.acc-section{margin-bottom:48px}
.acc-section-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;
  letter-spacing:1.5px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.acc-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* MI COLECCIÓN */
.acc-coleccion-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.acc-col-stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:18px;display:flex;align-items:center;gap:14px}
.acc-col-icon{font-size:1.8rem}
.acc-col-num{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--neon);line-height:1}
.acc-col-lbl{font-size:0.7rem;color:var(--muted);margin-top:2px}

/* RECOMPENSAS */
.acc-level-badge{display:flex;align-items:center;gap:16px;
  background:var(--bg2);border:1px solid rgba(57,255,20,0.2);
  border-radius:12px;padding:20px 24px;margin-bottom:20px}
.acc-level-emoji{font-size:2.5rem}
.acc-level-name{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:1px;color:var(--neon)}
.acc-level-pts{font-size:0.78rem;color:var(--muted);margin-top:3px}
.acc-progress-wrap{margin-bottom:24px}
.acc-progress-label{font-size:0.8rem;color:var(--muted);margin-bottom:8px}
.acc-progress-label strong{color:var(--white)}
.acc-progress-track{height:8px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden}
.acc-progress-fill{height:100%;background:linear-gradient(90deg,var(--neon),#00ff88);
  border-radius:4px;transition:width 0.8s ease}
.acc-beneficios{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:16px 20px;margin-bottom:20px}
.acc-ben-title{font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px}
.acc-ben-item{font-size:0.82rem;color:var(--neon);padding:4px 0}
.acc-levels-table{display:flex;flex-direction:column;gap:1px;background:var(--border);
  border-radius:12px;overflow:hidden}
.acc-lv-row{display:grid;grid-template-columns:36px 1fr 1fr;gap:12px;align-items:center;
  background:var(--bg2);padding:14px 18px;font-size:0.78rem}
.acc-lv-row.current{background:rgba(57,255,20,0.06);border-left:3px solid var(--neon)}
.acc-lv-row.locked{opacity:0.45}
.acc-lv-emoji{font-size:1.2rem}
.acc-lv-name{font-weight:700;margin-bottom:2px}
.acc-lv-cond{font-size:0.68rem;color:var(--muted)}
.acc-lv-bens{display:flex;flex-direction:column;gap:3px}
.acc-lv-bens span{font-size:0.68rem;color:rgba(255,255,255,0.5)}

/* FAVORITOS */
.acc-favs-list{display:flex;flex-direction:column;gap:8px}
.acc-fav-card{display:flex;align-items:center;justify-content:space-between;
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:14px 18px;transition:border-color 0.2s}
.acc-fav-card:hover{border-color:rgba(255,255,255,0.14)}
.acc-fav-name{font-weight:700;font-size:0.88rem;margin-bottom:3px}
.acc-fav-price{font-size:0.75rem;color:var(--gold)}
.acc-fav-remove{background:transparent;border:1px solid rgba(255,59,59,0.2);
  color:rgba(255,100,100,0.6);border-radius:6px;padding:6px 10px;
  cursor:pointer;font-size:0.75rem;transition:all 0.2s}
.acc-fav-remove:hover{background:rgba(255,59,59,0.1);color:var(--red);border-color:var(--red)}
.acc-empty{text-align:center;padding:40px;color:var(--muted);font-size:0.85rem}
.acc-empty a{color:var(--neon);text-decoration:none;font-weight:600}

/* RESPONSIVE */
@media(max-width:640px){
  .acc-page{padding:24px 16px 60px}
  .acc-header{flex-direction:column;gap:14px}
  .acc-caja-card{flex-direction:column;text-align:center}
  .acc-lv-row{grid-template-columns:30px 1fr}
  .acc-lv-bens{display:none}
  nav{padding:0 16px}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">⚽ Fuchito<span>Store</span></a>
  <div style="display:flex;align-items:center;gap:12px">
    <div id="fs-nav-slot" style="position:relative;display:inline-flex;align-items:center"></div>
    <a href="https://wa.me/528331033506?text=Hola%2C+quiero+pedir+un+jersey" target="_blank" class="nav-wa">💬 WhatsApp</a>
  </div>
</nav>

<div class="acc-page">

  <div class="acc-loading" id="acc-loading">
    <div class="acc-spinner"></div>
    Cargando tu cuenta…
  </div>

  <div id="acc-content" style="display:none">

    <!-- CABECERA -->
    <div class="acc-header">
      <div class="acc-avatar-wrap" id="acc-avatar">U</div>
      <div class="acc-meta">
        <h1 id="acc-nombre">—</h1>
        <div class="acc-meta-email" id="acc-email">—</div>
        <div class="acc-profile-grid">
          <div class="acc-stat">
            <div class="acc-stat-val" id="acc-nivel">⚽ Aficionado</div>
            <div class="acc-stat-lbl">Nivel</div>
          </div>
          <div class="acc-stat">
            <div class="acc-stat-val" id="acc-puntos">0</div>
            <div class="acc-stat-lbl">FuchiPoints</div>
          </div>
          <div class="acc-stat">
            <div class="acc-stat-val" id="acc-caja-status">🎁 Disponible</div>
            <div class="acc-stat-lbl">Caja diaria</div>
          </div>
          <div class="acc-stat">
            <div class="acc-stat-val" id="acc-fecha" style="font-size:0.85rem;padding-top:4px">—</div>
            <div class="acc-stat-lbl">Miembro desde</div>
          </div>
        </div>
      </div>
    </div>

    <!-- CUPÓN PENDIENTE -->
    <div class="acc-cupon" id="acc-cupon"></div>

    <!-- CAJA DIARIA -->
    <div class="acc-caja-card">
      <div class="acc-caja-info">
        <h3>🎁 Caja Diaria</h3>
        <p>Abre tu caja cada día y gana FuchiPoints</p>
        <div class="acc-caja-status" id="acc-caja-status2"></div>
      </div>
      <button class="acc-caja-btn" id="acc-caja-btn">Abrir caja</button>
    </div>

    <!-- MI COLECCIÓN -->
    <div class="acc-section" id="micoleccion">
      <div class="acc-section-title">❤️ Mi Colección</div>
      <div class="acc-coleccion-grid" id="acc-coleccion-stats">
        <div class="acc-loading" style="padding:20px;grid-column:1/-1">
          <div class="acc-spinner"></div>
        </div>
      </div>
    </div>

    <!-- RECOMPENSAS -->
    <div class="acc-section" id="recompensas">
      <div class="acc-section-title">🏆 FuchiPoints y Niveles</div>
      <div id="acc-rewards-panel">
        <div class="acc-loading" style="padding:40px">
          <div class="acc-spinner"></div>
        </div>
      </div>
    </div>

    <!-- FAVORITOS -->
    <div class="acc-section" id="favoritos">
      <div class="acc-section-title">🗂️ Jerseys Guardados</div>
      <div id="acc-favs-list" class="acc-favs-list"></div>
      <div id="acc-favs-empty" class="acc-empty" style="display:none">
        Aún no tienes jerseys guardados.<br>
        <a href="index.html">Explorar catálogo →</a>
      </div>
    </div>

  </div>
</div>

<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<script src="rewards.js"></script>
<script src="account.js"></script>
<script src="canje.js"></script>

</body>
</html>
