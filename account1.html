<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Cuenta — FuchitoStore</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase SDK v9 (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
/* ══════════════════════════════
   RESET + VARIABLES (idéntico a index.html)
══════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--bg2:#0f0f18;--bg3:#14141f;--bg4:#1c1c2a;
  --neon:#39FF14;--gold:#FFB700;--red:#FF3B3B;--green:#22c55e;
  --white:#fff;--muted:rgba(255,255,255,0.45);--border:rgba(255,255,255,0.07);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);overflow-x:hidden;padding-top:62px}

/* ── NAV (mismo estilo) ── */
nav{position:fixed;top:0;left:0;right:0;z-index:500;height:62px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 36px;background:rgba(9,9,15,0.92);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:8px;
  font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--neon);
  text-decoration:none}
.nav-logo span{color:var(--white)}
.nav-wa{display:flex;align-items:center;gap:7px;background:#25D366;color:#fff;
  font-weight:700;font-size:0.78rem;border:none;padding:9px 18px;border-radius:6px;
  cursor:pointer;text-decoration:none;transition:background 0.2s}
.nav-wa:hover{background:#1db954}

/* ── LAYOUT ── */
.acc-page{max-width:1100px;margin:0 auto;padding:48px 32px 80px}
.acc-header{display:flex;align-items:center;gap:20px;margin-bottom:48px;
  padding-bottom:32px;border-bottom:1px solid var(--border)}
.acc-avatar-wrap{width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--neon),#00a8ff);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--bg);
  flex-shrink:0;overflow:hidden;border:2px solid rgba(57,255,20,0.3)}
.acc-meta{flex:1}
.acc-meta h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;line-height:1}
.acc-meta p{font-size:0.8rem;color:var(--muted);margin-top:4px}
.acc-stats{display:flex;gap:24px;flex-wrap:wrap;margin-top:12px}
.acc-stat{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:10px 18px;text-align:center}
.acc-stat-num{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--neon);line-height:1}
.acc-stat-lbl{font-size:0.65rem;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);margin-top:2px}

/* ── SECCIONES ── */
.acc-section{margin-bottom:48px}
.acc-section-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;
  letter-spacing:1.5px;color:var(--white);margin-bottom:20px;
  display:flex;align-items:center;gap:10px}
.acc-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── PERFIL: info grid ── */
.acc-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.acc-info-card{background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:16px 20px}
.acc-info-label{font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:4px}
.acc-info-val{font-size:0.9rem;font-weight:600}

/* ── FAVORITOS ── */
.acc-favs-list{display:flex;flex-direction:column;gap:8px}
.acc-fav-card{display:flex;align-items:center;justify-content:space-between;
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:14px 18px;transition:border-color 0.2s}
.acc-fav-card:hover{border-color:rgba(255,255,255,0.14)}
.acc-fav-name{font-weight:700;font-size:0.88rem;margin-bottom:3px}
.acc-fav-price{font-size:0.75rem;color:var(--gold)}
.acc-fav-remove{background:transparent;border:1px solid rgba(255,59,59,0.2);
  color:rgba(255,100,100,0.6);border-radius:6px;padding:6px 10px;
  cursor:pointer;font-size:0.75rem;transition:all 0.2s;flex-shrink:0}
.acc-fav-remove:hover{background:rgba(255,59,59,0.1);color:var(--red);border-color:var(--red)}
.acc-empty{text-align:center;padding:40px;color:var(--muted);font-size:0.85rem}
.acc-empty a{color:var(--neon);text-decoration:none;font-weight:600}
.acc-empty a:hover{text-decoration:underline}

/* ── RECOMPENSAS ── */
.acc-level-badge{display:flex;align-items:center;gap:14px;
  background:var(--bg2);border:1px solid rgba(57,255,20,0.2);
  border-radius:12px;padding:18px 22px;margin-bottom:20px}
.acc-level-emoji{font-size:2rem}
.acc-level-name{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;
  letter-spacing:1px;color:var(--neon)}
.acc-level-benefit{font-size:0.75rem;color:var(--muted);margin-top:2px}
.acc-progress-wrap{margin-bottom:28px}
.acc-progress-label{font-size:0.8rem;color:var(--muted);margin-bottom:8px}
.acc-progress-label strong{color:var(--white)}
.acc-progress-track{height:8px;background:rgba(255,255,255,0.07);
  border-radius:4px;overflow:hidden}
.acc-progress-fill{height:100%;background:linear-gradient(90deg,var(--neon),#00ff88);
  border-radius:4px;transition:width 0.8s ease}
.acc-levels-table{display:flex;flex-direction:column;gap:1px;background:var(--border);border-radius:10px;overflow:hidden}
.acc-lv-row{display:grid;grid-template-columns:30px 1fr 120px 1fr;
  gap:12px;align-items:center;background:var(--bg2);padding:12px 18px;
  font-size:0.8rem}
.acc-lv-row.current{background:rgba(57,255,20,0.06);
  border-left:3px solid var(--neon)}
.acc-lv-emoji{font-size:1.1rem}
.acc-lv-name{font-weight:700}
.acc-lv-cond{color:var(--muted);font-size:0.72rem}
.acc-lv-ben{color:var(--gold);font-size:0.72rem}

/* ── LOADING STATE ── */
.acc-loading{text-align:center;padding:80px 32px;color:var(--muted);font-size:0.88rem}
.acc-spinner{width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--neon);border-radius:50%;animation:spin 0.8s linear infinite;
  margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .acc-page{padding:24px 16px 60px}
  .acc-header{flex-direction:column;align-items:flex-start;gap:14px}
  .acc-info-grid{grid-template-columns:1fr}
  .acc-lv-row{grid-template-columns:30px 1fr;gap:8px}
  .acc-lv-cond,.acc-lv-ben{display:none}
  nav{padding:0 16px}
}
</style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <a href="index.html" class="nav-logo">⚽ Fuchito<span>Store</span></a>
  <div style="display:flex;align-items:center;gap:12px">
    <!-- auth.js inyectará el botón de cuenta aquí -->
    <a href="https://wa.me/528331033506?text=Hola%2C+quiero+pedir+un+jersey" target="_blank" class="nav-wa">
      💬 WhatsApp
    </a>
  </div>
</nav>

<!-- ── CONTENIDO ── -->
<div class="acc-page">

  <!-- Estado cargando (se oculta cuando llegan los datos) -->
  <div class="acc-loading" id="acc-loading">
    <div class="acc-spinner"></div>
    Cargando tu cuenta…
  </div>

  <!-- Contenido real (oculto hasta que Firebase responda) -->
  <div id="acc-content" style="display:none">

    <!-- CABECERA ─────────────────────────────────────────── -->
    <div class="acc-header">
      <div class="acc-avatar-wrap" id="acc-avatar">U</div>
      <div class="acc-meta">
        <h1 id="acc-nombre">—</h1>
        <p id="acc-email">—</p>
        <div class="acc-stats">
          <div class="acc-stat">
            <div class="acc-stat-num" id="acc-compras">0</div>
            <div class="acc-stat-lbl">Compras</div>
          </div>
          <div class="acc-stat">
            <div class="acc-stat-num" id="acc-puntos">0</div>
            <div class="acc-stat-lbl">Puntos</div>
          </div>
          <div class="acc-stat">
            <div class="acc-stat-num" style="font-size:1rem;padding-top:4px" id="acc-fecha">—</div>
            <div class="acc-stat-lbl">Miembro desde</div>
          </div>
        </div>
      </div>
    </div>

    <!-- PERFIL ───────────────────────────────────────────── -->
    <div class="acc-section" id="perfil">
      <div class="acc-section-title">👤 Información de cuenta</div>
      <div class="acc-info-grid">
        <div class="acc-info-card">
          <div class="acc-info-label">Nombre</div>
          <div class="acc-info-val" id="acc-nombre2">—</div>
        </div>
        <div class="acc-info-card">
          <div class="acc-info-label">Correo</div>
          <div class="acc-info-val" id="acc-email2">—</div>
        </div>
      </div>
    </div>

    <!-- RECOMPENSAS ──────────────────────────────────────── -->
    <div class="acc-section" id="recompensas">
      <div class="acc-section-title">🏆 Mis Recompensas</div>
      <div id="acc-rewards-panel">
        <!-- Renderizado por account.js -->
        <div class="acc-loading" style="padding:40px">
          <div class="acc-spinner"></div>
          Calculando tu nivel…
        </div>
      </div>
    </div>

    <!-- FAVORITOS ────────────────────────────────────────── -->
    <div class="acc-section" id="favoritos">
      <div class="acc-section-title">❤️ Mis Favoritos</div>
      <div id="acc-favs-list" class="acc-favs-list"></div>
      <div id="acc-favs-empty" class="acc-empty" style="display:none">
        Aún no tienes favoritos.<br>
        <a href="index.html">Explorar jerseys →</a>
      </div>
    </div>

  </div><!-- /acc-content -->
</div><!-- /acc-page -->

<!-- ══════════════════════════════
     SCRIPTS (en orden)
══════════════════════════════ -->
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<script src="rewards.js"></script>
<script src="account.js"></script>

<script>
// Mostrar contenido una vez que auth.js detecta sesión
(function () {
  firebase.auth().onAuthStateChanged(function (user) {
    document.getElementById('acc-loading').style.display = 'none';
    if (user) {
      var content = document.getElementById('acc-content');
      content.style.display = '';

      // Sincronizar campos extra
      var db = firebase.firestore();
      db.collection('usuarios').doc(user.uid).get().then(function (snap) {
        if (!snap.exists) return;
        var d = snap.data();
        var n2 = document.getElementById('acc-nombre2');
        var e2 = document.getElementById('acc-email2');
        if (n2) n2.textContent = d.nombre || user.displayName || '';
        if (e2) e2.textContent = d.email  || user.email       || '';
      });
    }
  });
})();
</script>

</body>
</html>
